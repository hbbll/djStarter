version: '3.8'

services:
  # Django Application
  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: drf_merged_django
    restart: unless-stopped
    ports:
      - '${APP_PORT:-8000}:8000'
    environment:
      - DEBUG=${DEBUG:-True}
      - SECRET_KEY=${SECRET_KEY}
      - DB_NAME=${DB_NAME:-drf_merged}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-root}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio:9000}
      - MINIO_USER=${MINIO_USER:-minio}
      - MINIO_PASSWORD=${MINIO_PASSWORD:-minio123}
      - APP_PORT=${APP_PORT:-8000}
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - postgres
      - redis
      - minio
    networks:
      - drf_network

  # PostgreSQL Database
  postgres:
    image: postgres:13
    container_name: drf_merged_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${DB_NAME:-drf_merged}
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-root}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '${DB_PORT:-5432}:5432'
    networks:
      - drf_network

  # Redis Cache
  redis:
    image: redis:alpine
    container_name: drf_merged_redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    networks:
      - drf_network
    command: 'redis-server --save 20 1 --loglevel warning --requirepass ${REDIS_PASSWORD}'
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      retries: 3
      timeout: 5s

  # MinIO Object Storage
  minio:
    image: minio/minio:latest
    container_name: drf_merged_minio
    restart: unless-stopped
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    environment:
      - MINIO_ROOT_USER=${MINIO_USER:-minio}
      - MINIO_ROOT_PASSWORD=${MINIO_PASSWORD:-minio123}
    volumes:
      - minio_data:/data
    networks:
      - drf_network
    command: server /data --console-address ":9001"
    healthcheck:
      test:
        - CMD
        - curl
        - -f
        - http://localhost:9000/minio/health/live
      interval: 30s
      timeout: 20s
      retries: 3

  # Nginx Gateway
  nginx:
    image: nginx:alpine
    container_name: drf_merged_nginx
    restart: unless-stopped
    ports:
      - '${NGINX_PORT:-80}:80'
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./docker/nginx/proxy_params:/etc/nginx/proxy_params
      - ./docker/log:/var/log/nginx
      - static_volume:/var/www/static
      - media_volume:/var/www/media
    depends_on:
      - django
    networks:
      - drf_network
    extra_hosts:
      - 'host.docker.internal:host-gateway'

networks:
  drf_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  static_volume:
    driver: local
  media_volume:
    driver: local
